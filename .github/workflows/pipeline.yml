name : Voting App 2 ci/cd pipeline

on:
    push:
        branches: [main]
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: files
    steps:
      - uses: actions/checkout@v3
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - run: docker build -t olajobihaneef/voting-app2 .
      - run: docker push olajobihaneef/voting-app2
